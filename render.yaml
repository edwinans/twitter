services:
  - type: web
    name: twitter-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: twitter-db
          property: connectionString

  - type: web
    name: twitter-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://twitter-backend.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: twitter-db
    plan: free
